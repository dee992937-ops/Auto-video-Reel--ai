<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { console.warn('Blocked attempt to overwrite window.fetch'); },
            configurable: true
          });
        } catch (e) {
          console.error('Failed to patch fetch descriptor:', e);
        }
        
        // Suppress websocket error logs globally if needed, though vite config handles it
        var originalConsoleError = console.error;
        console.error = function() {
          if (arguments[0] && typeof arguments[0] === 'string' && arguments[0].includes('WebSocket closed without opened')) {
            return;
          }
          originalConsoleError.apply(console, arguments);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
